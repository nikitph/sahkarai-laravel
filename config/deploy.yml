# Kamal deploy for the SahkarAI production application.
# Deploys the ALREADY-PUBLISHED multi-arch image from GHCR (no build here).
service: sahkarai-laravel
# Runtime >=0.2.0-dev ships HEALTHCHECK NONE, so non-web roles need no workaround.
image: nikitph/sahkarai-laravel

registry:
  server: ghcr.io
  username: nikitph
  password:
    - KAMAL_REGISTRY_PASSWORD

# We deploy a prebuilt image; arch matters because the droplet is amd64.
builder:
  arch: amd64

servers:
  web:
    hosts:
      - 168.144.26.122
    # Only the web role migrates. Kamal boots the primary web role to healthy
    # before any other role, so the schema exists before workers start — no
    # pre-deploy hook, no crash-looping workers.
    # Redis supplies the shared migration lock, so overlapping deploys cannot
    # race migrations even on a brand-new database.
    env:
      clear:
        AUTORUN_ENABLED: "true"
        AUTORUN_LARAVEL_MIGRATION: "true"
        AUTORUN_LARAVEL_MIGRATION_ISOLATION: "true"
  worker:
    hosts:
      - 168.144.26.122
    cmd: php artisan queue:work --tries=2 --sleep=1 --timeout=180 --max-time=3600
    proxy: false
  scheduler:
    hosts:
      - 168.144.26.122
    cmd: php artisan schedule:work
    proxy: false

# kamal-proxy terminates :80 and forwards to the web role's app_port.
# THE question this test exists to answer: does SSE survive this proxy?
proxy:
  ssl: true
  host: app.168.144.26.122.sslip.io
  app_port: 8080
  healthcheck:
    path: /up
    interval: 3
    timeout: 20

env:
  clear:
    APP_ENV: production
    APP_DEBUG: "false"
    APP_URL: https://app.168.144.26.122.sslip.io
    AUTO_VERIFY_EMAIL: "true"
    LOG_CHANNEL: stderr
    LOG_STACK: stderr
    LOG_LEVEL: debug

    DB_CONNECTION: pgsql
    DB_HOST: sahkarai-laravel-postgres # accessory container name on the kamal network
    DB_PORT: "5432"
    DB_DATABASE: app
    DB_USERNAME: app

    SESSION_DRIVER: database
    QUEUE_CONNECTION: redis
    CACHE_STORE: redis
    REDIS_CLIENT: phpredis
    REDIS_HOST: sahkarai-laravel-redis
    REDIS_PORT: "6379"
    REDIS_QUEUE_RETRY_AFTER: "240"

    BROADCAST_CONNECTION: reverb
    REVERB_APP_ID: conformance
    REVERB_APP_KEY: conformancekey
    REVERB_HOST: ws.168.144.26.122.sslip.io   # via kamal-proxy
    REVERB_PORT: "443"
    REVERB_SCHEME: https
    REVERB_PUBLIC_HOST: ws.168.144.26.122.sslip.io
    REVERB_PUBLIC_PORT: "443"
    REVERB_PUBLIC_SCHEME: https

    PHP_OPCACHE_VALIDATE_TIMESTAMPS: "0"   # production: full opcache benefit
    HEALTHCHECK_PATH: /up
  secret:
    - APP_KEY
    - DB_PASSWORD
    - REVERB_APP_SECRET
    - DEEPSEEK_API_KEY
    - RAZORPAY_KEY_ID
    - RAZORPAY_KEY_SECRET
    - RAZORPAY_WEBHOOK_SECRET
    - RAZORPAY_TIER_1_PLAN_ID
    - RAZORPAY_TIER_2_PLAN_ID

# Immutable regulatory originals must outlive image/container replacement. Web
# serves downloads while workers acquire/extract, so every app role mounts the
# same single-host Docker volume.
volumes:
  - "sahkarai_storage:/var/www/html/storage/app"

accessories:
  postgres:
    image: postgres:17-alpine
    host: 168.144.26.122
    env:
      clear:
        POSTGRES_DB: app
        POSTGRES_USER: app
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    host: 168.144.26.122
    cmd: redis-server --appendonly yes
    directories:
      - data:/data

ssh:
  user: root
  keys:
    - ~/.ssh/sahkarai_laravel_deploy
