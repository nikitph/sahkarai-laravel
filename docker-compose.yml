# Runtime conformance stack: the four standard service roles all run from the
# SAME image, differing only by command — exactly how products will deploy.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - redisdata:/data

  web:
    image: ${APP_IMAGE:-sahkarai-laravel:local}
    build:
      context: .
      args:
        SERVICE: sahkarai-laravel
    env_file: .env
    environment:
      HEALTHCHECK_PATH: /up
    # runtime ships HEALTHCHECK NONE — the orchestrator declares health per role
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/up || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    ports:
      - "8002:8080"
    volumes:
      - appstorage:/var/www/html/storage/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ${APP_IMAGE:-sahkarai-laravel:local}
    env_file: .env
    command: php artisan queue:work --tries=3 --sleep=1 --timeout=180 --max-time=3600
    volumes:
      - appstorage:/var/www/html/storage/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: ${APP_IMAGE:-sahkarai-laravel:local}
    env_file: .env
    command: php artisan schedule:work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    image: ${APP_IMAGE:-sahkarai-laravel:local}
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  appstorage:
