name: deploy production

on:
  workflow_run:
    workflows: [verify]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ github.event.workflow_run.head_sha }}
      IMAGE: ghcr.io/nikitph/sahkarai-laravel
      REVERB_IMAGE: ghcr.io/nikitph/sahkarai-laravel-reverb
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
      APP_KEY: ${{ secrets.APP_KEY }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      REVERB_APP_SECRET: ${{ secrets.REVERB_APP_SECRET }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
      RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
      RAZORPAY_TIER_1_PLAN_ID: ${{ secrets.RAZORPAY_TIER_1_PLAN_ID }}
      RAZORPAY_TIER_2_PLAN_ID: ${{ secrets.RAZORPAY_TIER_2_PLAN_ID }}
      RAZORPAY_TIER_3_PLAN_ID: ${{ secrets.RAZORPAY_TIER_3_PLAN_ID }}

    steps:
      - name: Check out the verified revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: nikitph
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and publish immutable application image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ env.IMAGE }}:${{ env.VERSION }}
          build-args: SERVICE=sahkarai-laravel
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and publish immutable Reverb image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ env.REVERB_IMAGE }}:${{ env.VERSION }}
          build-args: SERVICE=sahkarai-laravel-reverb
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Kamal
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: '3.3'
      - run: gem install kamal --version 2.6.1 --no-document

      - name: Install production SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/sahkarai_laravel_deploy
          chmod 600 ~/.ssh/sahkarai_laravel_deploy
          printf '%s\n' '168.144.27.66 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJMWP2XgBuegTDZcEQAS01ALXhlF/dys5v1p7MQKzL5/' > ~/.ssh/known_hosts

      - name: Map GitHub secrets into Kamal
        run: |
          mkdir -p .kamal
          printf '%s\n' \
            'KAMAL_REGISTRY_PASSWORD=$KAMAL_REGISTRY_PASSWORD' \
            'APP_KEY=$APP_KEY' \
            'DB_PASSWORD=$DB_PASSWORD' \
            'POSTGRES_PASSWORD=$POSTGRES_PASSWORD' \
            'REVERB_APP_SECRET=$REVERB_APP_SECRET' \
            'DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY' \
            'RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID' \
            'RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET' \
            'RAZORPAY_WEBHOOK_SECRET=$RAZORPAY_WEBHOOK_SECRET' \
            'RAZORPAY_TIER_1_PLAN_ID=$RAZORPAY_TIER_1_PLAN_ID' \
            'RAZORPAY_TIER_2_PLAN_ID=$RAZORPAY_TIER_2_PLAN_ID' \
            'RAZORPAY_TIER_3_PLAN_ID=$RAZORPAY_TIER_3_PLAN_ID' \
            > .kamal/secrets

      - name: Roll out verified revision
        run: |
          kamal deploy --version="$VERSION" --skip-push
          kamal deploy -c config/deploy.reverb.yml --version="$VERSION" --skip-push

      - name: Verify public health endpoint
        run: curl --fail --retry 8 --retry-delay 3 --retry-all-errors https://app.168.144.27.66.sslip.io/up
